<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' https://cdn.tailwindcss.com;" />
    <title>Meetlify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --bg-a: #f4f7ff;
        --bg-b: #eefdf7;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --accent: #0ea5e9;
        --danger: #ef4444;
      }

      body {
        background: radial-gradient(1200px 500px at 50% -10%, #dbeafe 0%, transparent 60%), linear-gradient(145deg, var(--bg-a), var(--bg-b));
        color: var(--text);
        font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(148, 163, 184, 0.25);
      }

      .record-button {
        width: 9.5rem;
        height: 9.5rem;
        border-radius: 9999px;
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(145deg, #0ea5e9, #0284c7);
        color: white;
        font-weight: 700;
        letter-spacing: 0.02em;
        transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
        box-shadow: 0 20px 40px rgba(14, 165, 233, 0.25);
      }

      .record-button:hover {
        transform: translateY(-2px);
      }

      .record-button.recording {
        background: linear-gradient(145deg, #ef4444, #dc2626);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.55);
        animation: pulse-ring 1.3s infinite;
      }

      .record-button.pending {
        opacity: 0.7;
        pointer-events: none;
      }

      @keyframes pulse-ring {
        0% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5);
        }

        70% {
          box-shadow: 0 0 0 24px rgba(239, 68, 68, 0);
        }

        100% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
      }

      .meter-fill {
        transition: width 90ms linear;
      }

      .player-shell {
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 0.85rem;
        background: linear-gradient(180deg, rgba(248, 250, 252, 0.95), rgba(241, 245, 249, 0.95));
        padding: 0.4rem 0.6rem;
      }

      #recording-player {
        width: 100%;
        height: 2.6rem;
        border-radius: 0.6rem;
        accent-color: #0ea5e9;
      }

      .wrap-safe {
        min-width: 0;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .section-shell {
        display: grid;
        gap: 1rem;
      }

      .status-card {
        border: 1px solid rgba(191, 219, 254, 0.9);
        border-radius: 1rem;
        background: linear-gradient(180deg, rgba(239, 246, 255, 0.92), rgba(248, 250, 252, 0.95));
        padding: 0.95rem 1rem;
      }

      .actions-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .utility-card {
        border: 1px solid rgba(191, 219, 254, 0.85);
        border-radius: 1rem;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(248, 250, 252, 0.9));
        padding: 1rem;
      }

      .player-shell.is-empty {
        opacity: 0.65;
      }

      @media (max-width: 1023px) {
        .actions-grid {
          grid-template-columns: minmax(0, 1fr);
        }
      }
    </style>
  </head>
  <body class="min-h-screen">
    <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8 space-y-6">
      <section class="grid gap-6 lg:grid-cols-3">
        <div class="glass-card rounded-2xl p-5 shadow-sm">
          <h2 class="text-lg font-semibold">Recording</h2>
          <div class="mt-4 flex flex-col items-center gap-3">
            <button id="recording-toggle" class="record-button">Start</button>
            <div id="recording-state-label" class="text-sm font-medium text-slate-700">Ready to record</div>
            <div class="text-sm text-slate-600">Elapsed: <span id="elapsed-time">0s</span></div>
            <button id="output-file-path" class="wrap-safe w-full text-center text-sm text-sky-700 hover:underline">Start recording to see the file path</button>
          </div>
        </div>

        <div class="glass-card rounded-2xl p-5 shadow-sm lg:col-span-2">
          <h2 class="text-lg font-semibold">Recording Setup</h2>
          <div class="mt-4 grid gap-4 md:grid-cols-2">
            <div class="min-w-0">
              <label for="recording-filename" class="mb-2 block text-sm font-medium">Filename</label>
              <div class="flex gap-2">
                <input type="text" id="recording-filename" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="team-sync-2026-02-17" />
                <span class="rounded-lg bg-slate-100 px-3 py-2 text-sm text-slate-600">.flac</span>
              </div>
            </div>

            <div class="min-w-0">
              <label for="microphone-select" class="mb-2 block text-sm font-medium">Microphone</label>
              <select id="microphone-select" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                <option value="">No microphone</option>
              </select>
            </div>

            <div class="min-w-0">
              <label class="mb-2 block text-sm font-medium">Recordings Folder</label>
              <div id="selected-folder-path" class="wrap-safe min-h-[2.5rem] rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-xs text-slate-600"></div>
              <button id="select-folder" class="mt-2 rounded-lg border border-slate-300 px-3 py-2 text-sm hover:bg-slate-50">Open Recordings Folder</button>
            </div>

            <div class="min-w-0">
              <label class="mb-2 block text-sm font-medium">Transcripts Folder</label>
              <div id="selected-transcripts-path" class="wrap-safe min-h-[2.5rem] rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-xs text-slate-600"></div>
              <button id="open-transcript-folder" class="mt-2 rounded-lg border border-slate-300 px-3 py-2 text-sm hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50" disabled>
                Open Transcript Folder
              </button>
            </div>

            <div class="md:col-span-2">
              <label class="mb-2 block text-sm font-medium">Permissions</label>
              <div class="flex flex-wrap gap-2">
                <button id="check-permissions" class="rounded-lg border border-slate-300 px-3 py-2 text-sm hover:bg-slate-50">
                  Check Permissions
                </button>
                <button id="request-mic-permission" class="rounded-lg border border-slate-300 px-3 py-2 text-sm hover:bg-slate-50">
                  Request Microphone Permission
                </button>
              </div>
              <p class="mt-2 text-xs text-slate-500">Use this to trigger macOS permission prompts (Screen Recording + Microphone).</p>
            </div>

            <div class="md:col-span-2">
              <div class="grid gap-3 md:grid-cols-2">
                <div>
                  <div class="mb-1 text-sm font-medium">System Audio Level</div>
                  <div class="h-3 overflow-hidden rounded-full bg-slate-200">
                    <div id="system-level-fill" class="meter-fill h-full w-0 bg-sky-500"></div>
                  </div>
                </div>

                <div>
                  <div class="mb-1 text-sm font-medium">Microphone Level</div>
                  <div class="h-3 overflow-hidden rounded-full bg-slate-200">
                    <div id="mic-level-fill" class="meter-fill h-full w-0 bg-emerald-500"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="glass-card rounded-2xl p-5 shadow-sm">
        <div class="section-shell">
          <div id="processing-status-card" class="status-card">
            <div class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">Status</div>
            <div id="processing-status" class="wrap-safe mt-2 text-sm text-slate-700">Idle</div>
          </div>

          <div class="min-w-0">
            <label for="recording-select" class="mb-2 block text-sm font-medium">Recordings</label>
            <div class="flex gap-2">
              <select id="recording-select" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                <option value="">No recordings found</option>
              </select>
              <button id="refresh-recordings" class="rounded-lg border border-slate-300 px-3 py-2 text-sm hover:bg-slate-50">Refresh</button>
            </div>
            <div id="recording-meta" class="wrap-safe mt-3 text-sm text-slate-600"></div>
          </div>

          <div class="actions-grid">
            <div class="utility-card">
              <label class="mb-2 block text-sm font-medium">Gemini Processing</label>
              <div class="flex items-center gap-2">
                <select id="model-select" class="min-w-0 flex-1 rounded-lg border border-slate-300 px-3 py-2 text-sm">
                  <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                  <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                </select>
                <button id="process-recording" class="shrink-0 rounded-lg bg-sky-600 px-4 py-2 text-sm font-medium text-white hover:bg-sky-700 disabled:cursor-not-allowed disabled:opacity-50">
                  Process
                </button>
              </div>
            </div>

            <div class="utility-card">
              <label class="mb-2 block text-sm font-medium">MP3 Export</label>
              <div class="space-y-4">
                <button id="export-mp3" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium hover:bg-white disabled:cursor-not-allowed disabled:opacity-50">
                  Download MP3
                </button>
                <label for="chunk-mp3" class="flex cursor-pointer items-center gap-2 text-sm text-slate-700">
                  <input id="chunk-mp3" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-sky-600 focus:ring-sky-500" />
                  Chunk into &lt;= 90 MB pieces for AI uploads
                </label>
              </div>
            </div>
          </div>
        </div>

        <div id="player-shell" class="player-shell mt-4 is-empty">
          <audio id="recording-player" controls preload="metadata"></audio>
        </div>
      </section>

      <section class="glass-card rounded-2xl p-5 shadow-sm">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <h2 class="text-lg font-semibold">Transcript Editor</h2>
          <button id="save-markdown" class="rounded-lg border border-slate-300 px-3 py-2 text-sm hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50" disabled>
            Save Transcript
          </button>
        </div>

        <div class="mt-4 grid gap-3 lg:grid-cols-6">
          <input id="search-input" type="text" class="rounded-lg border border-slate-300 px-3 py-2 text-sm lg:col-span-2" placeholder="Search" />
          <input id="replace-input" type="text" class="rounded-lg border border-slate-300 px-3 py-2 text-sm lg:col-span-2" placeholder="Replace with" />
          <button id="search-prev" class="rounded-lg border border-slate-300 px-3 py-2 text-sm hover:bg-slate-50">Prev</button>
          <button id="search-next" class="rounded-lg border border-slate-300 px-3 py-2 text-sm hover:bg-slate-50">Next</button>
          <button id="replace-one" class="rounded-lg border border-slate-300 px-3 py-2 text-sm hover:bg-slate-50">Replace Current</button>
          <button id="replace-all" class="rounded-lg border border-slate-300 px-3 py-2 text-sm hover:bg-slate-50">Replace All</button>
        </div>

        <div id="search-status" class="mt-2 text-sm text-slate-600"></div>

        <div class="mt-4 grid gap-4 lg:grid-cols-2">
          <div>
            <label for="markdown-editor" class="mb-2 block text-sm font-medium">Markdown</label>
            <textarea id="markdown-editor" class="h-[420px] w-full rounded-lg border border-slate-300 p-3 font-mono text-xs" placeholder="Transcript markdown will appear here..."></textarea>
          </div>

          <div>
            <label class="mb-2 block text-sm font-medium">Preview</label>
            <div id="markdown-preview" class="prose prose-slate h-[420px] max-w-none overflow-auto rounded-lg border border-slate-200 bg-slate-50 p-4 text-sm"></div>
          </div>
        </div>
      </section>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
